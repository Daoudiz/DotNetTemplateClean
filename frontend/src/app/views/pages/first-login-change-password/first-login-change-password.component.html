<div class="bg-light min-vh-100 d-flex flex-row align-items-center">
  <c-container>
    <c-row class="justify-content-center">
      <c-col lg="6">
        <c-card class="p-4">
          <c-card-body>
            <h3>Première connexion</h3>
            <p class="text-medium-emphasis">
              Vous devez changer votre mot de passe lors de la première connexion.
            </p>

            @if (errorMessage) {
              <div class="alert alert-danger">{{ errorMessage }}</div>
            }

            <form [formGroup]="form" (ngSubmit)="onSubmit()">
              <div class="mb-3">
                <label class="form-label">Mot de passe temporaire / actuel</label>
                <input type="password" class="form-control" formControlName="oldPassword" autocomplete="current-password" />
              </div>

              <div class="mb-3">
                <label class="form-label">Nouveau mot de passe</label>
                <input type="password" class="form-control" formControlName="newPassword" autocomplete="new-password" />
              </div>

              <div class="mb-4">
                <label class="form-label">Confirmer le nouveau mot de passe</label>
                <input type="password" class="form-control" formControlName="confirmPassword" autocomplete="new-password" />
              </div>

              <button cButton color="success" type="submit" [disabled]="form.invalid || (isLoading$ | async)">
                @if (isLoading$ | async) {
                  <c-spinner size="sm" class="me-2"></c-spinner>
                  Chargement...
                } @else {
                  Changer le mot de passe et se connecter
                }
              </button>
            </form>
          </c-card-body>
        </c-card>
      </c-col>
    </c-row>
  </c-container>
</div>
